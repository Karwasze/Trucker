<!DOCTYPE html>
<html>
<head>
    <title>Log New Workout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media (max-width: 767px) {
            .nav-open { display: flex !important; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; padding: 0.5rem 0; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-relaxed text-gray-700 p-4 pt-20 md:max-w-3xl lg:max-w-5xl md:mx-auto md:px-8 md:pb-8">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-800 px-4 py-3 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="text-white text-lg font-bold no-underline flex items-center gap-2">
                Trucker
            </a>
            <button class="md:hidden bg-transparent border-none text-white text-2xl cursor-pointer px-2 py-1 leading-none" onclick="document.getElementById('nav-links').classList.toggle('nav-open')">&#9776;</button>
            <div id="nav-links" class="hidden md:flex gap-5 items-center">
                <a href="/workout/new" class="text-blue-400 bg-slate-700 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">Log Workout</a>
                <a href="/gzclp" class="text-gray-400 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">GZCLP</a>
                <a href="/workouts" class="text-gray-400 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">Workouts</a>
                <a href="/statistics" class="text-gray-400 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">Statistics</a>
                <a href="/exercises" class="text-gray-400 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">Exercises</a>
            </div>
        </div>
    </nav>

    <h1 class="text-2xl md:text-3xl mb-5 text-center text-slate-800">Log New Workout</h1>
    <form method="POST" action="/workout/create">
        <label class="font-medium mb-1 block">Date:</label>
        <input type="date" name="date" value="{{.Today}}" required class="w-full p-3 border border-gray-300 rounded-md text-base bg-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 mb-4">

        <div id="exercises">
            <div class="exercise my-4 p-4 border-2 border-gray-800 bg-white rounded-lg shadow">
                <h3 class="text-lg mb-3 text-slate-800">Exercise 1</h3>
                <label class="font-medium mb-1 block">Exercise:</label>
                <select name="exercise_0" onchange="loadLatestExercise(this.value, 0)" required class="w-full p-3 border border-gray-300 rounded-md text-base bg-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 mb-4">
                    <option value="">Select Exercise</option>
                    {{range .Exercises}}
                    <option value="{{.Name}}">{{.Name}}</option>
                    {{end}}
                </select>

                <div id="latest_data_0" class="hidden bg-blue-50 p-3 my-3 rounded-md border border-blue-200">
                    <h5 class="mb-2 text-slate-800 text-sm">Latest recorded sets for this exercise:</h5>
                    <div id="latest_sets_0"></div>
                </div>

                <div class="mt-4" id="sets_0">
                    <div class="set mb-2 px-2.5 py-2 border border-gray-200 bg-white rounded-md flex items-center gap-2">
                        <div class="font-semibold text-slate-800 text-sm min-w-[12px] shrink-0">Set 1</div>
                        <div class="flex gap-2 items-center ml-auto shrink-0">
                            <div class="flex items-center gap-1">
                                <input type="number" name="weight_0_0" step="0.5" min="0" required class="w-[60px] border border-gray-200 py-1.5 px-1 text-sm bg-gray-50 text-center rounded">
                                <label class="text-xs text-gray-500 font-medium whitespace-nowrap">kg</label>
                            </div>
                            <div class="flex items-center gap-1">
                                <input type="number" name="reps_0_0" min="1" required class="w-[60px] border border-gray-200 py-1.5 px-1 text-sm bg-gray-50 text-center rounded">
                                <label class="text-xs text-gray-500 font-medium whitespace-nowrap">reps</label>
                            </div>
                        </div>
                        <button type="button" class="remove-btn bg-transparent text-gray-400 text-sm p-0 m-0 border-none w-5 h-5 min-w-[20px] flex items-center justify-center rounded-sm shrink-0 hover:bg-gray-50 hover:text-red-500 cursor-pointer" onclick="removeSet(this, 0)">&#10060;</button>
                    </div>
                </div>
                <div class="flex gap-2.5 mt-3">
                    <button type="button" onclick="addSet(0)" class="flex-1 py-3 px-4 bg-blue-500 text-white border-none rounded-md text-base font-medium cursor-pointer transition-colors duration-200 hover:bg-blue-600">Add Another Set</button>
                    <button type="button" onclick="removeExercise(0)" class="flex-1 py-3 px-4 bg-red-600 text-white border-none rounded-md text-base font-medium cursor-pointer transition-colors duration-200 hover:bg-red-700">Remove Exercise</button>
                </div>
            </div>
        </div>

        <button type="button" onclick="addExercise()" class="w-full md:w-auto py-3 px-4 my-2 bg-blue-500 text-white border-none rounded-md text-base font-medium cursor-pointer transition-colors duration-200 hover:bg-blue-600">Add Another Exercise</button>
        <input type="submit" value="Log Workout" class="w-full py-4 mt-5 bg-green-600 text-white text-lg border-none rounded-md font-medium cursor-pointer transition-colors duration-200 hover:bg-green-700">
    </form>

    <script>
    let exerciseCount = 1;
    let setCounts = [1];

    function addExercise() {
        const exercisesDiv = document.getElementById('exercises');
        const newExercise = document.createElement('div');
        newExercise.className = 'exercise my-4 p-4 border-2 border-gray-800 bg-white rounded-lg shadow';

        setCounts.push(1);

        newExercise.innerHTML =
            '<h3 class="text-lg mb-3 text-slate-800">Exercise ' + (exerciseCount + 1) + '</h3>' +
            '<label class="font-medium mb-1 block">Exercise:</label>' +
            '<select name="exercise_' + exerciseCount + '" onchange="loadLatestExercise(this.value, ' + exerciseCount + ')" required class="w-full p-3 border border-gray-300 rounded-md text-base bg-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 mb-4">' +
                '<option value="">Select Exercise</option>' +
                {{range .Exercises}}
                '<option value="{{.Name}}">{{.Name}}</option>' +
                {{end}}
            '</select>' +
            '<div id="latest_data_' + exerciseCount + '" class="hidden bg-blue-50 p-3 my-3 rounded-md border border-blue-200">' +
                '<h5 class="mb-2 text-slate-800 text-sm">Latest recorded sets for this exercise:</h5>' +
                '<div id="latest_sets_' + exerciseCount + '"></div>' +
            '</div>' +
            '<div class="mt-4" id="sets_' + exerciseCount + '">' +
                '<div class="set mb-2 px-2.5 py-2 border border-gray-200 bg-white rounded-md flex items-center gap-2">' +
                    '<div class="font-semibold text-slate-800 text-sm min-w-[12px] shrink-0">Set 1</div>' +
                    '<div class="flex gap-2 items-center ml-auto shrink-0">' +
                        '<div class="flex items-center gap-1"><input type="number" name="weight_' + exerciseCount + '_0" step="0.5" min="0" required class="w-[60px] border border-gray-200 py-1.5 px-1 text-sm bg-gray-50 text-center rounded"><label class="text-xs text-gray-500 font-medium whitespace-nowrap">kg</label></div>' +
                        '<div class="flex items-center gap-1"><input type="number" name="reps_' + exerciseCount + '_0" min="1" required class="w-[60px] border border-gray-200 py-1.5 px-1 text-sm bg-gray-50 text-center rounded"><label class="text-xs text-gray-500 font-medium whitespace-nowrap">reps</label></div>' +
                    '</div>' +
                    '<button type="button" class="remove-btn bg-transparent text-gray-400 text-sm p-0 m-0 border-none w-5 h-5 min-w-[20px] flex items-center justify-center rounded-sm shrink-0 hover:bg-gray-50 hover:text-red-500 cursor-pointer" onclick="removeSet(this, ' + exerciseCount + ')">&#10060;</button>' +
                '</div>' +
            '</div>' +
            '<div class="flex gap-2.5 mt-3">' +
                '<button type="button" onclick="addSet(' + exerciseCount + ')" class="flex-1 py-3 px-4 bg-blue-500 text-white border-none rounded-md text-base font-medium cursor-pointer transition-colors duration-200 hover:bg-blue-600">Add Another Set</button>' +
                '<button type="button" onclick="removeExercise(' + exerciseCount + ')" class="flex-1 py-3 px-4 bg-red-600 text-white border-none rounded-md text-base font-medium cursor-pointer transition-colors duration-200 hover:bg-red-700">Remove Exercise</button>' +
            '</div>';

        exercisesDiv.appendChild(newExercise);
        exerciseCount++;

        const newInputs = newExercise.querySelectorAll('input, select');
        newInputs.forEach(input => {
            input.addEventListener('change', markFormChanged);
            input.addEventListener('input', markFormChanged);
        });
    }

    function addSet(exerciseIndex) {
        const setsDiv = document.getElementById('sets_' + exerciseIndex);
        const newSet = document.createElement('div');
        newSet.className = 'set mb-2 px-2.5 py-2 border border-gray-200 bg-white rounded-md flex items-center gap-2';

        const setNumber = setCounts[exerciseIndex];
        newSet.innerHTML =
            '<div class="font-semibold text-slate-800 text-sm min-w-[12px] shrink-0">Set ' + (setNumber + 1) + '</div>' +
            '<div class="flex gap-2 items-center ml-auto shrink-0">' +
                '<div class="flex items-center gap-1">' +
                    '<input type="number" name="weight_' + exerciseIndex + '_' + setNumber + '" step="0.5" min="0" required class="w-[60px] border border-gray-200 py-1.5 px-1 text-sm bg-gray-50 text-center rounded">' +
                    '<label class="text-xs text-gray-500 font-medium whitespace-nowrap">kg</label>' +
                '</div>' +
                '<div class="flex items-center gap-1">' +
                    '<input type="number" name="reps_' + exerciseIndex + '_' + setNumber + '" min="1" required class="w-[60px] border border-gray-200 py-1.5 px-1 text-sm bg-gray-50 text-center rounded">' +
                    '<label class="text-xs text-gray-500 font-medium whitespace-nowrap">reps</label>' +
                '</div>' +
            '</div>' +
            '<button type="button" class="remove-btn bg-transparent text-gray-400 text-sm p-0 m-0 border-none w-5 h-5 min-w-[20px] flex items-center justify-center rounded-sm shrink-0 hover:bg-gray-50 hover:text-red-500 cursor-pointer" onclick="removeSet(this, ' + exerciseIndex + ')">&#10060;</button>';

        setsDiv.appendChild(newSet);
        setCounts[exerciseIndex]++;

        const newInputs = newSet.querySelectorAll('input');
        newInputs.forEach(input => {
            input.addEventListener('change', markFormChanged);
            input.addEventListener('input', markFormChanged);
        });
    }

    function removeExercise(exerciseIndex) {
        const exercisesDiv = document.getElementById('exercises');
        const exercises = exercisesDiv.querySelectorAll('.exercise');

        if (exercises.length <= 1) {
            alert('You must have at least one exercise!');
            return;
        }

        exercises.forEach((exercise, index) => {
            if (index === exerciseIndex) {
                exercise.remove();
            }
        });
    }

    function removeSet(button, exerciseIndex) {
        const setsDiv = document.getElementById('sets_' + exerciseIndex);
        const sets = setsDiv.querySelectorAll('.set');

        if (sets.length <= 1) {
            alert('You must have at least one set per exercise!');
            return;
        }

        button.parentElement.remove();
    }

    function loadLatestExercise(exerciseName, exerciseIndex) {
        if (!exerciseName) {
            document.getElementById('latest_data_' + exerciseIndex).classList.add('hidden');
            return;
        }

        fetch('/api/latest-exercise?name=' + encodeURIComponent(exerciseName))
            .then(response => response.json())
            .then(data => {
                const latestDiv = document.getElementById('latest_data_' + exerciseIndex);
                const setsDiv = document.getElementById('latest_sets_' + exerciseIndex);

                if (data.sets && data.sets.length > 0) {
                    let setsHtml = '<table class="w-full border-collapse text-sm">';
                    setsHtml += '<tr><th class="border border-gray-300 p-1 text-left bg-gray-100 font-semibold">Reps</th><th class="border border-gray-300 p-1 text-left bg-gray-100 font-semibold">Weight</th></tr>';

                    data.sets.forEach(set => {
                        setsHtml += '<tr>';
                        setsHtml += '<td class="border border-gray-300 p-1">' + set.reps + '</td>';
                        setsHtml += '<td class="border border-gray-300 p-1">' + set.weight + ' kg</td>';
                        setsHtml += '</tr>';
                    });

                    setsHtml += '</table>';
                    setsDiv.innerHTML = setsHtml;
                    latestDiv.classList.remove('hidden');
                } else {
                    setsDiv.innerHTML = '<p class="m-0">No previous data for this exercise</p>';
                    latestDiv.classList.remove('hidden');
                }
            })
            .catch(error => {
                console.error('Error loading latest exercise data:', error);
                document.getElementById('latest_data_' + exerciseIndex).classList.add('hidden');
            });
    }

    let formChanged = false;
    let isSubmitting = false;

    function markFormChanged() {
        formChanged = true;
    }

    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('form');
        const inputs = form.querySelectorAll('input, select');

        inputs.forEach(input => {
            input.addEventListener('change', markFormChanged);
            input.addEventListener('input', markFormChanged);
        });

        form.addEventListener('submit', function() {
            isSubmitting = true;
        });
    });

    window.addEventListener('beforeunload', function(e) {
        if (formChanged && !isSubmitting) {
            e.preventDefault();
            e.returnValue = 'You have unsaved workout data. Are you sure you want to leave?';
            return e.returnValue;
        }
    });
    </script>

</body>
</html>
