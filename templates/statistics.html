<!DOCTYPE html>
<html>
<head>
    <title>Statistics - Trucker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media (max-width: 767px) {
            .nav-open { display: flex !important; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; padding: 0.5rem 0; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-relaxed text-gray-700 p-4 pt-20 md:max-w-6xl lg:max-w-7xl md:mx-auto md:px-8 md:pb-8">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-800 px-4 py-3 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="text-white text-lg font-bold no-underline flex items-center gap-2">
                Trucker
            </a>
            <button class="md:hidden bg-transparent border-none text-white text-2xl cursor-pointer px-2 py-1 leading-none" onclick="document.getElementById('nav-links').classList.toggle('nav-open')">&#9776;</button>
            <div id="nav-links" class="hidden md:flex gap-5 items-center">
                <a href="/workout/new" class="text-gray-400 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">Log Workout</a>
                <a href="/gzclp" class="text-gray-400 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">GZCLP</a>
                <a href="/workouts" class="text-gray-400 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">Workouts</a>
                <a href="/statistics" class="text-blue-400 bg-slate-700 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">Statistics</a>
                <a href="/exercises" class="text-gray-400 no-underline font-medium px-3 py-2 rounded transition-all duration-200 hover:text-white hover:bg-slate-700">Exercises</a>
            </div>
        </div>
    </nav>

    <h1 class="text-2xl md:text-3xl mb-6 text-center text-slate-800">Exercise Statistics</h1>

    <div class="bg-white rounded-lg p-4 mb-5 shadow">
        <div class="flex flex-col md:flex-row gap-3 md:items-center">
            <label for="exerciseSelect" class="font-medium text-slate-800 shrink-0">Select Exercise:</label>
            <select id="exerciseSelect" onchange="loadExerciseStats()" class="p-3 border border-gray-300 rounded-md text-base bg-white focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 md:flex-1 md:max-w-xs">
                <option value="">Loading exercises...</option>
            </select>
        </div>
    </div>

    <div id="statsContainer">
        <div class="text-center my-16 text-gray-500">
            <h3>No exercise selected</h3>
            <p>Please select an exercise</p>
        </div>
    </div>

    <script>
        let progressChart = null;
        let volumeChart = null;

        async function loadExercises() {
            try {
                const response = await fetch('/api/statistics');
                const data = await response.json();

                const select = document.getElementById('exerciseSelect');
                select.innerHTML = '<option value="">Select an exercise</option>';

                if (data.exercises && data.exercises.length > 0) {
                    data.exercises.forEach(exercise => {
                        const option = document.createElement('option');
                        option.value = exercise;
                        option.textContent = exercise;
                        select.appendChild(option);
                    });
                } else {
                    select.innerHTML = '<option value="">No exercises found</option>';
                    showNoData();
                }
            } catch (error) {
                console.error('Error loading exercises:', error);
                document.getElementById('exerciseSelect').innerHTML = '<option value="">Error loading exercises</option>';
                showNoData();
            }
        }

        async function loadExerciseStats() {
            const exercise = document.getElementById('exerciseSelect').value;
            if (!exercise) {
                showNoData();
                return;
            }

            document.getElementById('statsContainer').innerHTML = `
                <div class="text-center my-16 text-gray-500">
                    <h3>Loading ${exercise} statistics...</h3>
                    <p>Calculating your progress...</p>
                </div>
            `;

            try {
                const response = await fetch(`/api/statistics?exercise=${encodeURIComponent(exercise)}`);
                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    showStats(exercise, data);
                } else {
                    showNoDataForExercise(exercise);
                }
            } catch (error) {
                console.error('Error loading exercise stats:', error);
                showNoData();
            }
        }

        function showStats(exercise, data) {
            const container = document.getElementById('statsContainer');

            const oneRMs = data.data.map(d => d.estimated_1rm);
            const volumes = data.data.map(d => d.total_volume);
            const currentMax = Math.max(...oneRMs);
            const currentMaxVolume = Math.max(...volumes);
            const totalWorkouts = data.data.length;
            const improvement = oneRMs.length > 1 ?
                ((oneRMs[oneRMs.length - 1] - oneRMs[0]) / oneRMs[0] * 100).toFixed(1) : 0;
            const volumeImprovement = volumes.length > 1 ?
                ((volumes[volumes.length - 1] - volumes[0]) / volumes[0] * 100).toFixed(1) : 0;

            container.innerHTML = `
                <div class="bg-white rounded-lg p-4 mb-5 shadow">
                    <h3 class="text-center mb-4 text-slate-800">${exercise} Progress</h3>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                        <div class="text-center p-3 bg-gray-50 rounded-md">
                            <div class="text-xl font-bold text-slate-800">${currentMax.toFixed(1)} kg</div>
                            <div class="text-sm text-gray-500 mt-1">Current Max 1RM</div>
                        </div>
                        <div class="text-center p-3 bg-gray-50 rounded-md">
                            <div class="text-xl font-bold text-slate-800">${currentMaxVolume.toFixed(0)} kg</div>
                            <div class="text-sm text-gray-500 mt-1">Max Volume</div>
                        </div>
                        <div class="text-center p-3 bg-gray-50 rounded-md">
                            <div class="text-xl font-bold text-slate-800">${totalWorkouts}</div>
                            <div class="text-sm text-gray-500 mt-1">Total Workouts</div>
                        </div>
                        <div class="text-center p-3 bg-gray-50 rounded-md">
                            <div class="text-xl font-bold text-slate-800">${improvement}%</div>
                            <div class="text-sm text-gray-500 mt-1">1RM Improvement</div>
                        </div>
                        <div class="text-center p-3 bg-gray-50 rounded-md">
                            <div class="text-xl font-bold text-slate-800">${volumeImprovement}%</div>
                            <div class="text-sm text-gray-500 mt-1">Volume Improvement</div>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-lg p-5 md:p-6 my-4 shadow relative h-[300px] md:h-[400px]">
                    <div class="text-base font-semibold text-slate-800 mb-4 text-center">Estimated 1RM Progress Over Time</div>
                    <div class="relative h-[250px] md:h-[350px]">
                        <canvas id="progressChart"></canvas>
                    </div>
                </div>
                <div class="bg-white rounded-lg p-5 md:p-6 my-4 shadow relative h-[300px] md:h-[400px]">
                    <div class="text-base font-semibold text-slate-800 mb-4 text-center">Total Volume Progress Over Time</div>
                    <div class="relative h-[250px] md:h-[350px]">
                        <canvas id="volumeChart"></canvas>
                    </div>
                </div>
            `;

            if (progressChart) progressChart.destroy();
            if (volumeChart) volumeChart.destroy();

            const progressCtx = document.getElementById('progressChart').getContext('2d');
            progressChart = new Chart(progressCtx, {
                type: 'line',
                data: {
                    labels: data.data.map(d => new Date(d.date).toLocaleDateString()),
                    datasets: [{
                        label: 'Estimated 1RM (kg)',
                        data: data.data.map(d => d.estimated_1rm),
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        borderWidth: 3, fill: true, tension: 0.2,
                        pointBackgroundColor: '#3498db', pointBorderColor: '#2980b9',
                        pointBorderWidth: 2, pointRadius: 6, pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    layout: { padding: { bottom: 20 } },
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, grid: { color: 'rgba(0,0,0,0.1)' }, ticks: { callback: v => v.toFixed(1) + ' kg' } },
                        x: { grid: { color: 'rgba(0,0,0,0.1)' }, ticks: { padding: 10 } }
                    },
                    elements: { point: { hoverBackgroundColor: '#2980b9' } }
                }
            });

            const volumeCtx = document.getElementById('volumeChart').getContext('2d');
            volumeChart = new Chart(volumeCtx, {
                type: 'line',
                data: {
                    labels: data.data.map(d => new Date(d.date).toLocaleDateString()),
                    datasets: [{
                        label: 'Total Volume (kg)',
                        data: data.data.map(d => d.total_volume),
                        borderColor: '#e67e22',
                        backgroundColor: 'rgba(230, 126, 34, 0.1)',
                        borderWidth: 3, fill: true, tension: 0.2,
                        pointBackgroundColor: '#e67e22', pointBorderColor: '#d35400',
                        pointBorderWidth: 2, pointRadius: 6, pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    layout: { padding: { bottom: 20 } },
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.1)' }, ticks: { callback: v => v.toFixed(0) + ' kg' } },
                        x: { grid: { color: 'rgba(0,0,0,0.1)' }, ticks: { padding: 10 } }
                    },
                    elements: { point: { hoverBackgroundColor: '#d35400' } }
                }
            });
        }

        function showNoDataForExercise(exercise) {
            document.getElementById('statsContainer').innerHTML = `
                <div class="text-center my-16 py-10 px-5 bg-white rounded-lg shadow">
                    <h2 class="text-xl mb-4 text-gray-500">No data for ${exercise}</h2>
                    <p class="text-base text-gray-400">Start logging workouts to see your progress!</p>
                </div>
            `;
        }

        function showNoData() {
            document.getElementById('statsContainer').innerHTML = `
                <div class="text-center my-16 py-10 px-5 bg-white rounded-lg shadow">
                    <h2 class="text-xl mb-4 text-gray-500">No workout data found</h2>
                    <p class="text-base text-gray-400">Start logging workouts to see your progress statistics!</p>
                </div>
            `;
        }

        window.addEventListener('load', loadExercises);
    </script>
</body>
</html>
